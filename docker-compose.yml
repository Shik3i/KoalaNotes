services:
  koalanotes:
    build: .
    container_name: koalanotes
    ports:
      - "8081:8080"
    environment:
      - KOALA_LISTEN_ADDR=:8080
      - KOALA_DATA_DIR=/data
      - KOALA_JWT_SECRET=local-dev-jwt-secret-not-for-production
      - KOALA_CORS_ORIGINS=http://localhost:8081
    volumes:
      - koalanotes-data:/data
    restart: unless-stopped

volumes:
  koalanotes-data:
    driver: local
