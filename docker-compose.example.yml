# KoalaNotes self-hosted deployment example
# Copy this file to docker-compose.yml and customize as needed.
#
# Quick start:
#   docker compose up -d
#
# The app will be available at http://localhost:8080
#
# For production, place a reverse proxy (nginx, Caddy) in front with TLS.

services:
  koalanotes:
    image: ghcr.io/shik3i/koalanotes:latest
    container_name: koalanotes
    ports:
      - "8080:8080"
    environment:
      - KOALA_LISTEN_ADDR=:8080
      - KOALA_DATA_DIR=/data
      # - KOALA_JWT_SECRET=change-me-in-production  # Future: JWT signing secret
      # - KOALA_CORS_ORIGINS=https://your-domain.com  # Future: restrict origins
    volumes:
      - koalanotes-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  koalanotes-data:
    driver: local
